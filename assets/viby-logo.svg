      <stop offset="1" stop-color="#5637E8"/>
    </linearGradient>
    <linearGradient id="darkStroke" x1="271" y1="333" x2="357" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#191824"/>
      <stop offset="1" stop-color="#060712"/>
