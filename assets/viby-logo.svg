<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Viby logo</title>
  <desc id="desc">A minimal folded V shaped mark with a dot.</desc>
  <defs>
    <linearGradient id="purpleStroke" x1="164" y1="154" x2="272" y2="336" gradientUnits="userSpaceOnUse">
