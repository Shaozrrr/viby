<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>更多作品 - Viby</title>
    <link rel="icon" href="./logo-source.png" type="image/png" />
    <link rel="stylesheet" href="./styles.css?v=20260607a" />
  </head>
  <body class="works-page">
    <div class="grain" aria-hidden="true"></div>
    <header class="site-header">
      <a class="brand" href="./index.html" aria-label="Viby home">
        <img src="./logo-source.png" alt="Viby" />
        <span>Viby</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="./index.html#gallery">作品</a>
        <a href="./index.html#how">发布</a>
      </nav>
      <a class="ghost-button" href="./index.html">首页</a>
    </header>

    <main class="works-main">
      <section class="section">
        <div class="section-heading">
          <div>
            <span class="section-kicker">More builds</span>
            <h2>更多 Viby 作品</h2>
            <p>支持按作品名称、简介、平台类型与 GitHub 条件检索，快速找到你感兴趣的创作。</p>
          </div>
        </div>
        <div class="works-toolbar" aria-label="作品搜索与筛选">
          <label class="works-search-field">
            <span class="works-filter-label">搜索作品</span>
            <input
              id="worksSearchInput"
              type="search"
              placeholder="搜索作品名称、简介或创作者"
              autocomplete="off"
            />
          </label>
          <div class="works-filter-cluster">
            <div class="works-filter-block">
              <span class="works-filter-label">搜索范围</span>
              <div class="works-chip-group" id="worksScopeGroup" role="group" aria-label="搜索范围">
                <button type="button" class="works-chip is-active" data-search-scope="all">全部</button>
                <button type="button" class="works-chip" data-search-scope="title">仅名称</button>
                <button type="button" class="works-chip" data-search-scope="description">仅简介</button>
              </div>
            </div>
            <div class="works-filter-block">
              <span class="works-filter-label">作品类型</span>
              <div class="works-chip-group" id="worksCategoryGroup" role="group" aria-label="作品类型">
                <button type="button" class="works-chip is-active" data-category-filter="all">全部</button>
                <button type="button" class="works-chip" data-category-filter="app">App</button>
                <button type="button" class="works-chip" data-category-filter="website">网站</button>
              </div>
            </div>
            <label class="works-toggle">
              <input id="worksGithubOnly" type="checkbox" />
              <span>仅看附带 GitHub 的作品</span>
            </label>
          </div>
          <div class="works-toolbar-foot">
            <p class="works-result-summary" id="worksResultSummary">正在整理作品列表…</p>
            <button type="button" class="works-reset-button" id="worksResetFilters" hidden>清除筛选</button>
          </div>
        </div>
        <div class="work-grid" id="allWorksGrid" aria-live="polite"></div>
        <p class="pagination-guide" id="paginationGuide">正在整理作品…</p>
        <div class="pagination" id="worksPagination" aria-label="分页"></div>
      </section>
    </main>

    <aside class="link-guard-overlay" aria-hidden="true" aria-label="外链安全提示">
      <div class="link-guard-shell">
        <button class="close-button link-guard-close" type="button" data-close-link-guard aria-label="关闭">×</button>
        <span class="section-kicker">Safety check</span>
        <h2 id="linkGuardTitle">即将离开 Viby</h2>
        <p class="link-guard-intro" id="linkGuardIntro">
          你将访问第三方站点。继续前，请自行核对域名与页面真实性，不要提交密码、短信验证码、银行卡、助记词或私钥。
        </p>
        <div class="link-guard-chip" id="linkGuardChip"></div>
        <div class="link-guard-reasons" id="linkGuardReasons" hidden></div>
        <p class="link-guard-legal-note">
          Viby 仅提供公开作品展示入口，不对外部站点的合法性、安全性、可用性、交易结果或后续损失承担保证责任。
        </p>
        <div class="link-guard-actions">
          <button type="button" class="share-action-button" data-close-link-guard>取消</button>
          <button type="button" class="share-action-button primary" data-confirm-link-guard>继续访问</button>
        </div>
      </div>
    </aside>

    <script src="./works.js?v=20260607a"></script>
  </body>
</html>
