# 示例：Nginx 反向代理到本项目的 Node 服务（监听 127.0.0.1:4184）
# 安装证书后把 ssl_certificate 路径换成你的实际路径（Let's Encrypt 或腾讯云证书）

server {
    listen 443 ssl http2;
    server_name viby.ink www.viby.ink;

    ssl_certificate     /etc/nginx/ssl/viby.ink/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/viby.ink/privkey.pem;

    # 可选：腾讯云 / certbot 常见增强
    # ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:4184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name viby.ink www.viby.ink;
    return 301 https://viby.ink$request_uri;
}
