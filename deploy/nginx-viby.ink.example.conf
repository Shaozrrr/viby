# 示例：Nginx 反向代理到本项目的 Node 服务（监听 127.0.0.1:4184）
# 安装证书后把 ssl_certificate 路径换成你的实际路径（Let's Encrypt 或腾讯云证书）
#
# 重要：下面把 www 永久转到裸域，避免同一用户同时在 viby.ink 与 www.viby.ink 种两套 Cookie，
# 从而出现「像登录了但 /api/me 401」。若你必须双域并存，请在 .env 设置 COOKIE_DOMAIN=.viby.ink 并重启 Node。

# —— www 只做跳转 ——
server {
    listen 443 ssl http2;
    server_name www.viby.ink;

    ssl_certificate     /etc/nginx/ssl/viby.ink/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/viby.ink/privkey.pem;

    return 301 https://viby.ink$request_uri;
}

# —— 主站 ——
server {
    listen 443 ssl http2;
    server_name viby.ink;

    ssl_certificate     /etc/nginx/ssl/viby.ink/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/viby.ink/privkey.pem;

    # 可选：腾讯云 / certbot 常见增强
    # ssl_protocols TLSv1.2 TLSv1.3;

    # 会话 Cookie（签名）可能较长，避免 400 / 丢头
    large_client_header_buffers 4 32k;

    location /api/ {
        proxy_pass http://127.0.0.1:4184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;

        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;

        # 勿对 API 做静态缓存（避免把 401/JSON 缓在边缘）
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:4184;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }
}

server {
    listen 80;
    server_name viby.ink www.viby.ink;
    return 301     https://viby.ink$request_uri;
}
